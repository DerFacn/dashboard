services:
  dashboard:
    image: python:3.11-slim
    container_name: dashboard
    ports:
      - "5555:8000"
    volumes:
      - ./app.py:/app/app.py
      - ./data:/app/data
    working_dir: /app
    environment:
      - ADMIN_PASSWORD=SuperSecret
      - FLASK_SECRET_KEY=my-super-secret-session-key
    command: sh -c "pip install --no-cache-dir flask gunicorn requests beautifulsoup4 werkzeug && gunicorn -w 1 -b 0.0.0.0:8000 app:app"
    restart: unless-stopped