<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page_title }}</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    
    <style>
        :root {
            --bg: {{ theme.bg }};
            --card: {{ theme.card }};
            --text: {{ theme.text }};
            --accent: {{ theme.accent }};
        }
        body {
            {% if theme.bg_mode == 'image' and theme.bg_image %}
                background-image: url('/api/bg?img={{ theme.bg_image }}');
                background-size: cover;
                background-position: center;
                background-attachment: fixed;
            {% elif theme.bg_mode == 'gradient' and theme.gradient %}
                background: {{ theme.gradient }};
                background-attachment: fixed;
            {% else %}
                background-color: var(--bg);
            {% endif %}
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>{{ dash_title }}</h1>
        
        <div class="groups">
            <button class="group-btn active" onclick="filterGroup('all', this)">All</button>
            {% for group in groups %}
            <button class="group-btn" onclick="filterGroup('{{ group }}', this)">{{ group }}</button>
            {% endfor %}
        </div>

        <div class="grid" id="linksGrid">
            {% for link in links %}
            <a href="{{ link.url }}" class="card" data-group="{{ link.group }}" target="_blank" title="{{ link.description if link.description else link.title }}">
                <img src="/api/icon?id={{ link.id }}" alt="icon">
                <div>
                    <h3>{{ link.title }}</h3>
                    <span class="card-group">{{ link.group }}</span>
                </div>
                {% if is_admin %}
                <div class="card-actions" onclick="event.preventDefault();">
                    <button class="action-btn" onclick="postAction('move_up', '{{ link.id }}')" title="Left">←</button>
                    <button class="action-btn" onclick="postAction('move_down', '{{ link.id }}')" title="Right">→</button>
                    <button class="action-btn" 
                            data-id="{{ link.id }}" data-title="{{ link.title }}" data-url="{{ link.url }}" 
                            data-group="{{ link.group }}" data-desc="{{ link.description|default('') }}" 
                            data-custom-icon="{{ link.custom_icon|default('') }}"
                            onclick="openEditModal(this)" title="Edit">✎</button>
                    <button class="action-btn delete" onclick="if(confirm('Delete?')) postAction('delete', '{{ link.id }}')" title="Delete">✕</button>
                </div>
                {% endif %}
            </a>
            {% endfor %}
        </div>
    </div>

    {% if is_admin %}
        <div style="position: fixed; bottom: 2rem; right: 2rem; z-index: 10; display: flex; gap: 1rem;">
            <a href="/logout" class="admin-btn-float" style="position: static; box-shadow: none; border-color: transparent;">🚪</a>
            <div class="admin-btn-float" style="position: static; box-shadow: none; border-color: transparent;" onclick="document.getElementById('themeModal').classList.add('active')">🎨</div>
            <div class="admin-btn-float" style="position: static; box-shadow: none; border-color: transparent;" onclick="openAddModal()">➕</div>
        </div>
    {% else %}
        <div class="admin-btn-float" onclick="document.getElementById('loginModal').classList.add('active')">🔒</div>
    {% endif %}

    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h2>Admin panel</h2>
            <form action="/login" method="POST">
                <input type="password" name="password" placeholder="Password" required autofocus>
                <button type="submit" class="btn" style="margin-top: 1rem;">Login</button>
                <button type="button" class="btn close-btn" onclick="document.getElementById('loginModal').classList.remove('active')">Cancel</button>
            </form>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2 id="modalTitle">Add resource</h2>
            <form action="/api/action" method="POST" id="editForm" enctype="multipart/form-data">
                <input type="hidden" name="action" value="save">
                <input type="hidden" name="id" id="formId">
                <input type="text" name="title" id="formTitle" placeholder="Name (e.g.: Proxmox)" required>
                <input type="url" name="url" id="formUrl" placeholder="URL (e.g.: https://example.com)" required>
                <input type="text" name="group" id="formGroup" placeholder="Group (e.g.: Monitorings)" required>
                <input type="text" name="description" id="formDescription" placeholder="Description (optional)">
                
                <div class="checkbox-group">
                    <input type="checkbox" name="use_custom_icon" id="formUseCustomIcon">
                    <label for="formUseCustomIcon">Use custom icon</label>
                </div>
                <input type="file" name="icon_file" id="formIconFile" accept="image/*" style="display: none; padding: 0; background: transparent; border: none;">

                <button type="submit" class="btn" style="margin-top: 1rem;">Save</button>
                <button type="button" class="btn close-btn" onclick="document.getElementById('editModal').classList.remove('active')">Cancel</button>
            </form>
        </div>
    </div>

    {% if is_admin %}
    <div class="modal" id="themeModal">
        <div class="modal-content" style="width: 400px;">
            <h2>Theme Settings</h2>

            <form action="/api/theme" method="POST" style="margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1);">
                <input type="hidden" name="action" value="switch_profile">
                <label style="font-size: 0.9rem; color: var(--text);">Load Profile:</label>
                <div style="display: flex; gap: 0.5rem; margin-top: 0.5rem;">
                    <select name="profile_name" id="profileSelectDropdown" style="flex-grow: 1;">
                        {% for p_name in profiles.keys() %}
                        <option value="{{ p_name }}" {% if p_name == active_profile_name %}selected{% endif %}>{{ p_name }}</option>
                        {% endfor %}
                    </select>
                    <button type="submit" class="btn" style="width: auto; padding: 0.5rem 1rem;">Load</button>
                    <button type="button" class="btn danger" style="width: auto; padding: 0.5rem 1rem;" onclick="submitDeleteProfile()">Del</button>
                </div>
            </form>

            <form action="/api/theme" method="POST" id="deleteProfileForm" style="display: none;">
                <input type="hidden" name="action" value="delete_profile">
                <input type="hidden" name="profile_name" id="deleteProfileNameInput">
            </form>

            <form action="/api/theme" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="action" value="save_profile">
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
                    <div>
                        <label style="font-size: 0.8rem;">Main Background</label>
                        <input type="color" name="bg_color" value="{{ theme.bg }}" style="height: 35px; padding: 0; border: none; cursor: pointer;">
                    </div>
                    <div>
                        <label style="font-size: 0.8rem;">Card Background</label>
                        <input type="color" name="card_color" value="{{ theme.card }}" style="height: 35px; padding: 0; border: none; cursor: pointer;">
                    </div>
                    <div>
                        <label style="font-size: 0.8rem;">Text Color</label>
                        <input type="color" name="text_color" value="{{ theme.text }}" style="height: 35px; padding: 0; border: none; cursor: pointer;">
                    </div>
                    <div>
                        <label style="font-size: 0.8rem;">Accent (Hover)</label>
                        <input type="color" name="accent_color" value="{{ theme.accent }}" style="height: 35px; padding: 0; border: none; cursor: pointer;">
                    </div>
                </div>

                <label style="font-size: 0.9rem;">Background Mode</label>
                <select name="bg_mode" id="bgModeSelect" style="margin-top: 0.5rem; margin-bottom: 1rem;" onchange="toggleBgMode()">
                    <option value="solid" {% if theme.bg_mode == 'solid' %}selected{% endif %}>Solid Color</option>
                    <option value="gradient" {% if theme.bg_mode == 'gradient' %}selected{% endif %}>Gradient</option>
                    <option value="image" {% if theme.bg_mode == 'image' %}selected{% endif %}>Image</option>
                </select>

                <div id="gradientInput" style="display: {% if theme.bg_mode == 'gradient' %}block{% else %}none{% endif %}; margin-bottom: 1rem;">
                    <label style="font-size: 0.9rem;">Gradient CSS</label>
                    <input type="text" name="gradient_css" value="{{ theme.gradient }}" placeholder="linear-gradient(45deg, #1e1e2e, #89b4fa)" style="margin-top: 0.5rem;">
                </div>

                <div id="imageInput" style="display: {% if theme.bg_mode == 'image' %}block{% else %}none{% endif %}; margin-bottom: 1rem;">
                    <label style="font-size: 0.9rem;">Upload Background Image</label>
                    <input type="file" name="bg_file" accept="image/*" style="padding: 0; background: transparent; border: none; margin-top: 0.5rem;">
                </div>

                <label style="font-size: 0.9rem;">Save as Profile Name</label>
                <input type="text" name="profile_name" value="{{ active_profile_name }}" required style="margin-top: 0.5rem; margin-bottom: 1rem;">

                <button type="submit" class="btn">Save Profile</button>
                <button type="button" class="btn close-btn" onclick="document.getElementById('themeModal').classList.remove('active')">Cancel</button>
            </form>
        </div>
    </div>
    {% endif %}

    <script>
        function filterGroup(group, btnElement) {
            document.querySelectorAll('.group-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.querySelectorAll('.card').forEach(card => {
                card.style.display = (group === 'all' || card.dataset.group === group) ? 'flex' : 'none';
            });
        }

        function postAction(action, id) {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/api/action';
            ['action', 'id'].forEach(name => {
                const input = document.createElement('input');
                input.name = name; input.value = name === 'action' ? action : id;
                form.appendChild(input);
            });
            document.body.appendChild(form);
            form.submit();
        }

        // Logic for icon file upload visibility
        const customIconCheckbox = document.getElementById('formUseCustomIcon');
        if (customIconCheckbox) {
            customIconCheckbox.addEventListener('change', function() {
                document.getElementById('formIconFile').style.display = this.checked ? 'block' : 'none';
            });
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = 'Add resource';
            document.getElementById('formId').value = '';
            document.getElementById('formTitle').value = '';
            document.getElementById('formUrl').value = '';
            document.getElementById('formGroup').value = '';
            document.getElementById('formDescription').value = '';
            document.getElementById('formUseCustomIcon').checked = false;
            document.getElementById('formIconFile').style.display = 'none';
            document.getElementById('editModal').classList.add('active');
        }

        function openEditModal(btnElement) {
            const data = btnElement.dataset;
            document.getElementById('modalTitle').innerText = 'Edit resource';
            document.getElementById('formId').value = data.id;
            document.getElementById('formTitle').value = data.title;
            document.getElementById('formUrl').value = data.url;
            document.getElementById('formGroup').value = data.group;
            document.getElementById('formDescription').value = data.desc;
            
            const hasCustom = data.customIcon && data.customIcon !== 'None' && data.customIcon !== '';
            document.getElementById('formUseCustomIcon').checked = hasCustom;
            document.getElementById('formIconFile').style.display = hasCustom ? 'block' : 'none';
            
            document.getElementById('editModal').classList.add('active');
        }

        // Theme Modal Logic
        function toggleBgMode() {
            const mode = document.getElementById('bgModeSelect').value;
            document.getElementById('gradientInput').style.display = mode === 'gradient' ? 'block' : 'none';
            document.getElementById('imageInput').style.display = mode === 'image' ? 'block' : 'none';
        }

        function submitDeleteProfile() {
            const profileName = document.getElementById('profileSelectDropdown').value;
            if (profileName === 'Dark' || profileName === 'Light') {
                alert("Cannot delete default profiles!");
                return;
            }
            if(confirm('Delete profile "' + profileName + '"?')) {
                document.getElementById('deleteProfileNameInput').value = profileName;
                document.getElementById('deleteProfileForm').submit();
            }
        }
    </script>
</body>
</html>
